<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀의 상자 - 누구의 마음일까?</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; }
        
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .blur-reveal {
            filter: blur(12px);
            transition: filter 0.5s ease;
            cursor: pointer;
        }
        .blur-reveal.revealed {
            filter: blur(0);
            cursor: default;
        }
    </style>
</head>
<body class="bg-slate-900 min-h-screen flex flex-col items-center justify-start p-4 relative text-slate-800">

    <button onclick="promptReset()" class="fixed bottom-6 right-6 bg-red-500/20 hover:bg-red-500/80 backdrop-blur-md border border-red-500/50 text-white text-xs font-bold py-2 px-4 rounded-full shadow-xl z-50 transition-all flex items-center gap-2">
        ⚙️ 상자 비우기
    </button>

    <div id="mainContainer" class="w-full max-w-md bg-white rounded-[2rem] shadow-2xl overflow-hidden mb-10 mt-2 border border-slate-100 transition-all duration-500">
        
        <div class="bg-gradient-to-br from-indigo-600 via-purple-600 to-fuchsia-600 p-6 text-white text-center relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-full bg-white/10 blur-2xl transform -skew-y-12 -translate-y-10"></div>
            <h1 class="text-3xl font-black tracking-tight relative z-10 drop-shadow-md">Guess Who?</h1>
            <p class="text-indigo-100 text-sm mt-1 font-medium tracking-wide relative z-10">취향과 밸런스 게임으로 주인 찾기!</p>
        </div>

        <div id="inputView" class="p-5 space-y-6">
            
            <div id="input-form" class="space-y-5">
                <div class="bg-indigo-50/50 p-4 rounded-xl border border-indigo-100 space-y-3">
                    <div>
                        <label class="block text-xs font-bold text-rose-500 ml-1 mb-1">내 이름 (정답용)</label>
                        <input type="text" id="writerName" class="w-full p-2.5 bg-white rounded-lg focus:ring-2 focus:ring-rose-400 outline-none border border-slate-200 font-bold" placeholder="본인 이름이나 별명">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-700 ml-1 mb-1">요즘 관심사</label>
                        <input type="text" id="interest" class="w-full p-2.5 bg-white rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none border border-slate-200" placeholder="예) 본인이 최근에 흥미있던것들">
                    </div>
                </div>

                <div class="bg-slate-50 p-4 rounded-xl border border-slate-200 space-y-3">
                    <span class="block text-sm font-black text-slate-800 mb-2 border-b border-slate-200 pb-2">💡 소소한 질문</span>
                    
                    <div>
                        <label class="block text-[11px] font-bold text-slate-600 mb-1">1. 인생 최고 소울푸드는?</label>
                        <input type="text" id="q1" class="w-full p-2.5 text-sm bg-white rounded-lg border border-slate-200 outline-none focus:border-indigo-400" placeholder="예) 국밥, 마라탕, 떡볶이">
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-slate-600 mb-1">2. 좋아하는(관심있는) 성경 구절?</label>
                        <input type="text" id="q2" class="w-full p-2.5 text-sm bg-white rounded-lg border border-slate-200 outline-none focus:border-indigo-400" placeholder="예) 렘 5:14">
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-slate-600 mb-1">3. 싫어하는 음식?</label>
                        <input type="text" id="q3" class="w-full p-2.5 text-sm bg-white rounded-lg border border-slate-200 outline-none focus:border-indigo-400" placeholder="예) 홍어">
                    </div>
                </div>

                <div class="bg-purple-50 p-4 rounded-xl border border-purple-100 space-y-3">
                    <span class="block text-sm font-black text-purple-800 mb-2 border-b border-purple-200 pb-2">⚖️ 궁극의 밸런스 게임 (하나만 선택!)</span>
                    
                    <div class="grid grid-cols-1 gap-2">
                        <select id="b1" class="w-full p-2 text-xs bg-white rounded-lg border border-purple-200 outline-none font-medium">
                            <option value="">1. 눈(폭설) vs 비(폭우)</option>
                            <option value="눈 (폭설)">👉 눈 (폭설)</option>
                            <option value="비 (폭우)">👉 비 (폭우)</option>
                        </select>
                        <select id="b2" class="w-full p-2 text-xs bg-white rounded-lg border border-purple-200 outline-none font-medium">
                            <option value="">2. 더운 것 vs 추운 것</option>
                            <option value="더운 것">👉 더운 것</option>
                            <option value="추운 것">👉 추운 것</option>
                        </select>
                        <select id="b3" class="w-full p-2 text-xs bg-white rounded-lg border border-purple-200 outline-none font-medium">
                            <option value="">3. 수면 시간 밸런스</option>
                            <option value="하루 3시간만 자기">👉 하루에 3시간만 잠자기 가능</option>
                            <option value="하루 12시간 강제 숙면">👉 하루 12시간 강제 숙면</option>
                        </select>
                        <select id="b4" class="w-full p-2 text-xs bg-white rounded-lg border border-purple-200 outline-none font-medium">
                            <option value="">4. 재능 밸런스</option>
                            <option value="초반 천재형 (나중에 못함)">👉 처음엔 천재급이지만 나중엔 못해짐</option>
                            <option value="대기만성형 (점점 잘해짐)">👉 처음엔 못하지만 점점 하면 할수록 잘해짐</option>
                        </select>
                        <select id="b5" class="w-full p-2 text-xs bg-white rounded-lg border border-purple-200 outline-none font-medium">
                            <option value="">5. 생존 밸런스</option>
                            <option value="목마른데 퍽퍽한 빵만 먹기">👉 목마른데 퍽퍽한 빵만 먹기 가능</option>
                            <option value="배고픈데 물로만 배채우기">👉 배고픈데 물로만 배채우기 가능</option>
                        </select>
                        <select id="b6" class="w-full p-2 text-xs bg-white rounded-lg border border-purple-200 outline-none font-medium">
                            <option value="">6. 음료수 밸런스</option>
                            <option value="사이다">👉 사이다</option>
                            <option value="콜라">👉 콜라</option>
                        </select>
                    </div>
                </div>

                <div class="bg-slate-50 p-4 rounded-xl border border-slate-200">
                    <div class="flex justify-between items-end mb-2">
                        <label class="block text-[11px] font-bold text-slate-700 ml-1">⚡ 순발력 테스트</label>
                        <span id="gameMsg" class="text-[10px] text-red-500 font-bold hidden bg-red-100 px-2 py-0.5 rounded-full">페널티 +2초!</span>
                    </div>
                    <div id="gameBox" onclick="handleGameTap()" class="w-full h-12 bg-slate-200 hover:bg-slate-300 rounded-lg flex items-center justify-center font-bold text-slate-500 text-xs cursor-pointer select-none transition-colors shadow-inner active:scale-95 duration-100">
                        여기를 터치하여 시작
                    </div>
                    <input type="hidden" id="reactionScore" value="">
                </div>

                <button onclick="saveToBox()" id="submitBtn" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-4 rounded-xl shadow-lg transition-transform active:scale-[0.98] duration-200 mt-2">
                    제출하기 🔒
                </button>
            </div>

            <div class="mt-6 border-t border-slate-100 pt-6">
                <div class="text-center mb-4 flex justify-center items-center gap-2">
                    <span class="text-slate-500 text-sm font-medium">현재 모인 사람:</span>
                    <span class="text-2xl font-black text-indigo-600"><span id="count">0</span>명</span>
                </div>

                <button onclick="startGame()" class="w-full bg-gradient-to-r from-indigo-500 to-purple-500 text-white font-black text-lg py-4 rounded-xl shadow-[0_10px_20px_rgba(99,102,241,0.3)] hover:shadow-[0_10px_25px_rgba(99,102,241,0.5)] transition-all active:scale-[0.98]">
                    게임 시작! 하나씩 열어보기 🎁
                </button>
            </div>
        </div>

        <div id="playView" class="hidden flex-col min-h-[700px] bg-slate-50">
            <div class="p-4 flex justify-between items-center bg-white border-b border-slate-200 shadow-sm z-10">
                <span id="progressText" class="font-bold text-indigo-600 bg-indigo-50 px-3 py-1 rounded-full text-sm">1 / 5</span>
                <button onclick="endGame()" class="text-xs font-bold text-slate-400 hover:text-slate-700 bg-slate-100 px-3 py-1.5 rounded-lg">게임 종료</button>
            </div>

            <div class="flex-1 overflow-y-auto p-5 relative flex flex-col justify-start pb-20" id="cardContainer">
                </div>

            <div class="p-5 bg-white border-t border-slate-200 absolute bottom-0 w-full z-20">
                <button onclick="showNextCard()" id="nextBtn" class="w-full bg-slate-900 text-white font-black py-4 rounded-xl shadow-lg active:scale-[0.98] transition-transform">
                    다음 사람 보기 ➡️
                </button>
            </div>
        </div>

    </div>

    <script>
        let gameState = 'idle'; 
        let timeoutId = null;
        let gameStartTime = 0;
        let currentRound = 0;
        const maxRounds = 5;
        let totalTimeMs = 0;
        let penaltyTimeMs = 0;

        function handleGameTap() {
            const box = document.getElementById('gameBox');
            const scoreInput = document.getElementById('reactionScore');
            const gameMsg = document.getElementById('gameMsg');

            if (gameState === 'idle' || gameState === 'done') {
                currentRound = 0; totalTimeMs = 0; penaltyTimeMs = 0;
                scoreInput.value = ""; gameMsg.classList.add('hidden');
                startNextRound();
            } else if (gameState === 'red') {
                clearTimeout(timeoutId);
                gameState = 'penalty';
                penaltyTimeMs += 2000; 
                box.className = "w-full h-12 bg-yellow-400 rounded-lg flex items-center justify-center font-bold text-yellow-900 text-sm cursor-pointer select-none shadow-inner active:scale-95 duration-100";
                box.innerText = "앗! 페널티 +2초";
                gameMsg.classList.remove('hidden');
                setTimeout(() => { if(gameState === 'penalty') startNextRound(); }, 1500);
            } else if (gameState === 'green') {
                const reactionTime = Date.now() - gameStartTime;
                totalTimeMs += reactionTime;
                currentRound++;

                if (currentRound < maxRounds) {
                    startNextRound();
                } else {
                    gameState = 'done';
                    const finalAverage = ((totalTimeMs + penaltyTimeMs) / 1000 / maxRounds).toFixed(3);
                    box.className = "w-full h-12 bg-indigo-500 rounded-lg flex items-center justify-center font-bold text-white text-sm cursor-pointer select-none shadow-inner active:scale-95 duration-100";
                    box.innerHTML = `기록: ${finalAverage}초`;
                    scoreInput.value = finalAverage;
                }
            }
        }

        function startNextRound() {
            gameState = 'red';
            const box = document.getElementById('gameBox');
            box.className = "w-full h-12 bg-rose-500 rounded-lg flex flex-col items-center justify-center font-bold text-white text-[10px] cursor-pointer select-none shadow-inner active:scale-95 duration-100";
            box.innerHTML = `초록색일때 터치! [${currentRound + 1}/${maxRounds}]`;
            
            const randomDelay = Math.floor(Math.random() * 2000) + 1500;
            timeoutId = setTimeout(() => {
                if(gameState === 'red') {
                    gameState = 'green';
                    box.className = "w-full h-12 bg-emerald-500 rounded-lg flex items-center justify-center font-black text-lg text-white cursor-pointer select-none shadow-lg active:scale-95 duration-100";
                    box.innerText = "터치!!!";
                    gameStartTime = Date.now();
                }
            }, randomDelay);
        }
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAasIYMFoI6bGKxtIkLrsezM3_hTcu-qTc",
            authDomain: "gamee-da82e.firebaseapp.com",
            projectId: "gamee-da82e",
            storageBucket: "gamee-da82e.firebasestorage.app",
            messagingSenderId: "595318343509",
            appId: "1:595318343509:web:029ab9ad5ea658326791dc",
            measurementId: "G-8XH7K7XV3V"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let box = []; 
        let shuffledBox = [];
        let currentIndex = 0;

        signInAnonymously(auth).catch(error => console.error("로그인 실패:", error));

        const dbCollection = collection(db, "secretBox");
        onSnapshot(dbCollection, (snapshot) => {
            box = [];
            snapshot.forEach((doc) => box.push(doc.data()));
            document.getElementById('count').innerText = box.length;
        });

        // 데이터 저장
        window.saveToBox = async () => {
            const writerName = document.getElementById('writerName').value;
            const interest = document.getElementById('interest').value;
            const q1 = document.getElementById('q1').value;
            const q2 = document.getElementById('q2').value;
            const q3 = document.getElementById('q3').value;
            
            // 밸런스 게임 값 가져오기
            const b1 = document.getElementById('b1').value;
            const b2 = document.getElementById('b2').value;
            const b3 = document.getElementById('b3').value;
            const b4 = document.getElementById('b4').value;
            const b5 = document.getElementById('b5').value;
            const b6 = document.getElementById('b6').value;

            const reactionScore = document.getElementById('reactionScore').value; 

            if (!writerName) return alert("이름을 꼭 적어주세요!");

            const btn = document.getElementById('submitBtn');
            btn.innerText = "저장 중..."; btn.disabled = true;

            try {
                await addDoc(dbCollection, { 
                    writerName, interest, q1, q2, q3, b1, b2, b3, b4, b5, b6, reactionScore 
                });
                
                document.querySelectorAll('input[type="text"], select, input[type="hidden"]').forEach(el => el.value = '');
                const gameBox = document.getElementById('gameBox');
                gameBox.className = "w-full h-12 bg-slate-200 hover:bg-slate-300 rounded-lg flex items-center justify-center font-bold text-slate-500 text-xs cursor-pointer select-none active:scale-95 duration-100";
                gameBox.innerText = "여기를 터치하여 시작";
                document.getElementById('gameMsg').classList.add('hidden');
                gameState = 'idle';
                
                alert("성공적으로 제출되었습니다!");
            } catch (error) {
                alert("에러 발생: " + error.message);
            } finally {
                btn.innerText = "제출하기 🔒"; btn.disabled = false;
            }
        };

        // 매칭 게임 시작
        window.startGame = () => {
            if (box.length < 2) return alert("최소 2명 이상 입력해야 시작할 수 있습니다!");
            
            document.getElementById('inputView').classList.add('hidden');
            document.getElementById('playView').classList.remove('hidden');
            document.getElementById('playView').classList.add('flex');
            
            shuffledBox = [...box].sort(() => Math.random() - 0.5);
            currentIndex = 0;
            
            renderCard();
        };

        // 카드 렌더링
        window.renderCard = () => {
            const container = document.getElementById('cardContainer');
            const person = shuffledBox[currentIndex];
            
            document.getElementById('progressText').innerText = `${currentIndex + 1} / ${shuffledBox.length}`;
            
            const scoreText = person.reactionScore ? `${person.reactionScore}초` : '안함';

            container.innerHTML = `
                <div class="fade-in bg-white p-6 rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.06)] border border-slate-100 w-full mb-6">
                    
                    <div class="flex items-center gap-2 mb-4 pb-4 border-b border-slate-100">
                        <span class="text-xs bg-slate-800 text-yellow-400 px-3 py-1 rounded-full font-bold shadow-sm">⚡ 순발력: ${scoreText}</span>
                        <span class="text-xs bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full font-bold shadow-sm line-clamp-1">👀 관심: ${person.interest || '비밀'}</span>
                    </div>

                    <div class="space-y-4">
                        <div class="space-y-2">
                            <div class="bg-slate-50 p-3 rounded-xl border border-slate-100">
                                <span class="text-[10px] font-bold text-slate-400 block mb-1">🍲 최고 소울푸드</span>
                                <div class="text-sm font-bold text-slate-800">${person.q1 || '비밀'}</div>
                            </div>
                            <div class="bg-slate-50 p-3 rounded-xl border border-slate-100">
                                <span class="text-[10px] font-bold text-slate-400 block mb-1">📖 좋아하는 성경구절</span>
                                <div class="text-sm font-bold text-slate-800">${person.q2 || '비밀'}</div>
                            </div>
                            <div class="bg-slate-50 p-3 rounded-xl border border-slate-100">
                                <span class="text-[10px] font-bold text-slate-400 block mb-1">🤢 싫어하는 음식</span>
                                <div class="text-sm font-bold text-slate-800">${person.q3 || '비밀'}</div>
                            </div>
                        </div>

                        <div class="pt-2">
                            <span class="text-xs font-black text-purple-600 mb-2 block">⚖️ 나의 밸런스 취향</span>
                            <div class="flex flex-wrap gap-1.5">
                                ${person.b1 ? `<span class="bg-purple-50 text-purple-700 border border-purple-100 text-[11px] font-bold px-2 py-1 rounded-md">${person.b1}</span>` : ''}
                                ${person.b2 ? `<span class="bg-purple-50 text-purple-700 border border-purple-100 text-[11px] font-bold px-2 py-1 rounded-md">${person.b2}</span>` : ''}
                                ${person.b3 ? `<span class="bg-purple-50 text-purple-700 border border-purple-100 text-[11px] font-bold px-2 py-1 rounded-md">${person.b3}</span>` : ''}
                                ${person.b4 ? `<span class="bg-purple-50 text-purple-700 border border-purple-100 text-[11px] font-bold px-2 py-1 rounded-md">${person.b4}</span>` : ''}
                                ${person.b5 ? `<span class="bg-purple-50 text-purple-700 border border-purple-100 text-[11px] font-bold px-2 py-1 rounded-md">${person.b5}</span>` : ''}
                                ${person.b6 ? `<span class="bg-purple-50 text-purple-700 border border-purple-100 text-[11px] font-bold px-2 py-1 rounded-md">${person.b6}</span>` : ''}
                                ${(!person.b1 && !person.b2 && !person.b3 && !person.b4 && !person.b5 && !person.b6) ? `<span class="text-xs text-slate-400">선택하지 않음</span>` : ''}
                            </div>
                        </div>
                    </div>

                    <div class="mt-6 pt-5 border-t border-slate-100 text-center relative group">
                        <span class="absolute -top-2.5 left-1/2 -translate-x-1/2 bg-white px-2 text-[10px] font-bold text-slate-400 z-20">이 취향의 주인은?</span>
                        <div onclick="revealAnswer(this)" class="blur-reveal bg-rose-50 py-5 rounded-2xl relative overflow-hidden select-none border border-rose-100">
                            <div class="text-rose-600 font-black text-2xl tracking-wide">${person.writerName || '익명'}</div>
                            <div class="absolute inset-0 flex items-center justify-center bg-slate-800/5 opacity-100 group-hover:opacity-0 transition duration-300 pointer-events-none">
                                <span class="bg-slate-800 text-white text-xs font-bold px-3 py-1.5 rounded-full shadow-md">터치해서 정답 확인 👆</span>
                            </div>
                        </div>
                    </div>

                </div>
            `;
            
            const nextBtn = document.getElementById('nextBtn');
            if (currentIndex === shuffledBox.length - 1) {
                nextBtn.innerText = "결과 닫기 🏁";
                nextBtn.classList.replace('bg-slate-900', 'bg-rose-500');
            } else {
                nextBtn.innerText = "다음 사람 보기 ➡️";
                nextBtn.classList.replace('bg-rose-500', 'bg-slate-900');
            }
        };

        window.revealAnswer = (element) => {
            element.classList.add('revealed');
            element.querySelector('.absolute').style.display = 'none';
        };

        window.showNextCard = () => {
            if (currentIndex < shuffledBox.length - 1) {
                currentIndex++;
                renderCard();
            } else {
                endGame();
            }
        };

        window.endGame = () => {
            document.getElementById('playView').classList.add('hidden');
            document.getElementById('playView').classList.remove('flex');
            document.getElementById('inputView').classList.remove('hidden');
        };

        window.promptReset = async () => {
            const pwd = prompt("초기화 암호를 입력하세요:");
            if (pwd === "3950") {
                if (confirm("상자를 싹 비우시겠습니까?")) {
                    try {
                        const querySnapshot = await getDocs(dbCollection);
                        const deletePromises = [];
                        querySnapshot.forEach((documentSnapshot) => {
                            deletePromises.push(deleteDoc(doc(db, "secretBox", documentSnapshot.id)));
                        });
                        await Promise.all(deletePromises);
                        alert("초기화 완료!");
                        endGame(); 
                    } catch (error) {
                        alert("오류 발생: " + error.message);
                    }
                }
            } else if (pwd !== null) {
                alert("암호가 틀렸습니다.");
            }
        };
    </script>
</body>
</html>
